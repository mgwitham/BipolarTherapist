<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Therapist Profile — BipolarTherapyHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --teal: #1a7a8f;
        --teal-light: #2a9cb3;
        --teal-dark: #155f70;
        --teal-faint: #e8f5f8;
        --navy: #1d3a4a;
        --slate: #4a6572;
        --muted: #6b8290;
        --border: #d4e4e9;
        --bg: #f7fbfc;
        --white: #ffffff;
        --green: #3aaa7a;
        --sand: #f6f1e7;
        --ink-soft: #284857;
        --shadow-soft: 0 24px 60px rgba(16, 67, 83, 0.08);
        --shadow-card: 0 16px 34px rgba(18, 76, 94, 0.07);
      }
      body {
        font-family: "Inter", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(42, 156, 179, 0.09), transparent 26%),
          radial-gradient(circle at top right, rgba(246, 241, 231, 0.9), transparent 28%),
          linear-gradient(180deg, #f9fcfd 0%, #f3f8fa 42%, #f8fbfc 100%);
        color: var(--navy);
        line-height: 1.6;
      }
      nav {
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(212, 228, 233, 0.8);
        padding: 0 1.5rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 12px 34px rgba(13, 57, 72, 0.08);
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }
      .nav-icon {
        width: 34px;
        height: 34px;
        background: var(--teal);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
      }
      .nav-name {
        font-size: 1rem;
        font-weight: 700;
        color: var(--navy);
      }
      .nav-name span {
        color: var(--teal);
      }
      .nav-links {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        list-style: none;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--slate);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--teal);
      }
      .nav-shortlist {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }
      .nav-shortlist-count {
        min-width: 1.25rem;
        height: 1.25rem;
        border-radius: 999px;
        background: var(--teal-faint);
        color: var(--teal-dark);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0 0.35rem;
      }
      .nav-cta {
        background: var(--teal) !important;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        font-weight: 600 !important;
      }
      .breadcrumb {
        padding: 0.75rem 1.5rem;
        background: rgba(255, 255, 255, 0.78);
        border-bottom: 1px solid rgba(212, 228, 233, 0.72);
        font-size: 0.8rem;
        color: var(--muted);
      }
      .breadcrumb a {
        color: var(--teal);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .profile-wrap {
        max-width: 1120px;
        margin: 2.3rem auto;
        padding: 0 1.5rem;
      }
      .profile-header {
        position: relative;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(248, 252, 253, 0.96) 100%
        );
        border: 1px solid rgba(212, 228, 233, 0.9);
        border-radius: 30px;
        padding: 1.65rem;
        margin-bottom: 1.45rem;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        gap: 1.45rem;
        align-items: start;
        box-shadow: var(--shadow-soft);
      }
      .profile-header::before {
        content: "";
        position: absolute;
        inset: -20% auto auto -8%;
        width: 320px;
        height: 320px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(42, 156, 179, 0.13), transparent 68%);
        pointer-events: none;
      }
      .profile-header::after {
        content: "";
        position: absolute;
        inset: auto -8% -16% auto;
        width: 300px;
        height: 300px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(246, 241, 231, 0.95), transparent 70%);
        pointer-events: none;
      }
      .profile-hero-main {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 1.1rem;
      }
      .profile-identity {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 1.1rem;
        align-items: start;
        padding: 1rem 1.05rem;
        border-radius: 24px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92) 0%,
          rgba(246, 250, 251, 0.9) 100%
        );
        border: 1px solid rgba(212, 228, 233, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      }
      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        background: linear-gradient(135deg, var(--teal-dark), var(--teal-light));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
        box-shadow: 0 18px 34px rgba(21, 95, 112, 0.22);
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .profile-main h1 {
        font-family: "Lora", serif;
        font-size: 2.3rem;
        font-weight: 600;
        color: var(--navy);
        line-height: 1.02;
        letter-spacing: -0.02em;
      }
      .eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal);
        margin-bottom: 0.55rem;
      }
      .profile-main .creds {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--teal);
        margin-top: 0.3rem;
      }
      .profile-main .title-text {
        font-size: 0.92rem;
        color: var(--slate);
        margin-top: 0.12rem;
      }
      .profile-main .location {
        font-size: 0.9rem;
        color: var(--muted);
        margin-top: 0.45rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .practice-line {
        color: var(--navy);
        font-weight: 500;
      }
      .hero-meta {
        display: grid;
        gap: 0.75rem;
        margin-top: 0.4rem;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.45rem 0.95rem;
        border-radius: 100px;
        width: fit-content;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }
      .badge-accepting {
        background: #e8f5ee;
        color: #1f7a52;
      }
      .badge-waitlist {
        background: #f5f5f5;
        color: var(--muted);
      }
      .trust-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .hero-signal-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.95fr);
        gap: 0.7rem;
        align-items: stretch;
      }
      .hero-freshness-banner {
        padding: 0.9rem 1rem;
        border-radius: 18px;
        border: 1px solid rgba(14, 77, 95, 0.1);
        background: linear-gradient(180deg, #f7fcf9 0%, #ffffff 100%);
        box-shadow: 0 10px 24px rgba(15, 74, 92, 0.05);
      }
      .hero-freshness-banner.tone-recent {
        background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      }
      .hero-freshness-banner.tone-stale {
        background: linear-gradient(180deg, #fffdf8 0%, #ffffff 100%);
        border-color: rgba(194, 157, 76, 0.22);
      }
      .hero-freshness-label {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.18rem;
      }
      .hero-freshness-value {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--navy);
      }
      .hero-freshness-note {
        margin-top: 0.22rem;
        font-size: 0.8rem;
        line-height: 1.6;
        color: var(--slate);
      }
      .fit-snapshot-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }
      .hero-snapshot-panel {
        display: grid;
        gap: 0.55rem;
        padding: 0.88rem 0.95rem;
        border-radius: 18px;
        border: 1px solid rgba(29, 58, 74, 0.08);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96) 0%,
          rgba(246, 250, 251, 0.96) 100%
        );
        box-shadow: 0 10px 24px rgba(15, 74, 92, 0.04);
      }
      .trust-pill {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.42rem 0.78rem;
        border-radius: 999px;
        background: rgba(26, 122, 143, 0.09);
        color: var(--teal-dark);
        border: 1px solid rgba(26, 122, 143, 0.08);
      }
      .snapshot-pill {
        font-size: 0.74rem;
        font-weight: 700;
        padding: 0.4rem 0.72rem;
        border-radius: 999px;
        background: rgba(29, 58, 74, 0.06);
        color: var(--navy);
        border: 1px solid rgba(29, 58, 74, 0.05);
      }
      .hero-support-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.8rem;
        align-items: start;
      }
      .hero-support-grid .profile-queue-status {
        grid-column: 1 / -1;
      }
      .fit-summary {
        font-size: 0.94rem;
        line-height: 1.72;
        color: var(--ink-soft);
      }
      .hero-verdict-card {
        position: relative;
        border: 1px solid rgba(26, 122, 143, 0.14);
        border-radius: 24px;
        padding: 1.25rem 1.3rem 1.2rem;
        background: linear-gradient(
          135deg,
          rgba(247, 252, 253, 0.98) 0%,
          rgba(234, 245, 248, 0.96) 100%
        );
        box-shadow: var(--shadow-card);
      }
      .hero-verdict-card::before {
        content: "";
        position: absolute;
        left: 1.3rem;
        top: 0;
        width: 76px;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--teal) 0%, #5ab6c9 100%);
      }
      .hero-verdict-card h2 {
        font-family: "Lora", serif;
        font-size: 1.5rem;
        line-height: 1.08;
        color: var(--navy);
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }
      .hero-verdict-card p {
        font-size: 0.88rem;
        color: var(--slate);
        line-height: 1.6;
        margin-bottom: 0.78rem;
      }
      .profile-entry-banner {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(220px, 0.75fr);
        gap: 0.8rem;
        padding: 1rem 1.05rem;
        border-radius: 22px;
        border: 1px solid rgba(26, 122, 143, 0.14);
        background: linear-gradient(
          135deg,
          rgba(247, 252, 253, 0.98) 0%,
          rgba(234, 245, 248, 0.96) 100%
        );
        box-shadow: var(--shadow-card);
      }
      .profile-entry-banner-main {
        display: grid;
        gap: 0.3rem;
      }
      .profile-entry-kicker {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .profile-entry-title {
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.3;
        color: var(--navy);
      }
      .profile-entry-copy {
        font-size: 0.84rem;
        line-height: 1.62;
        color: var(--slate);
      }
      .profile-entry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.55rem;
      }
      .profile-entry-card {
        display: grid;
        gap: 0.2rem;
        padding: 0.72rem 0.76rem;
        border-radius: 16px;
        border: 1px solid rgba(14, 77, 95, 0.08);
        background: rgba(255, 255, 255, 0.86);
      }
      .profile-entry-card-label {
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .profile-entry-card-value {
        font-size: 0.8rem;
        line-height: 1.55;
        color: var(--slate);
      }
      .hero-decision-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.95rem;
      }
      .profile-summary-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .summary-stat {
        border: 1px solid rgba(26, 122, 143, 0.1);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.86);
        padding: 1rem 1.05rem;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.64);
      }
      .summary-stat-label {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.28rem;
      }
      .summary-stat-value {
        font-size: 0.94rem;
        font-weight: 700;
        color: var(--navy);
        line-height: 1.35;
      }
      .summary-stat-value.green {
        color: var(--green);
      }
      .summary-stat-value.teal {
        color: var(--teal-dark);
      }
      .hero-summary-card {
        border: 1px solid rgba(26, 122, 143, 0.1);
        border-radius: 22px;
        padding: 1.08rem 1.1rem;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.97) 0%,
          rgba(248, 251, 252, 0.96) 100%
        );
        box-shadow: var(--shadow-card);
        min-height: 100%;
      }
      .decision-proof-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.82rem;
      }
      .decision-proof-card {
        position: relative;
        padding: 1rem 1.05rem;
        border-radius: 22px;
        border: 1px solid rgba(26, 122, 143, 0.12);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(244, 250, 251, 0.96) 100%
        );
        box-shadow: 0 16px 32px rgba(18, 76, 94, 0.06);
      }
      .decision-proof-card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 1.05rem;
        width: 56px;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--teal) 0%, rgba(90, 182, 201, 0.45) 100%);
      }
      .decision-proof-label {
        padding-top: 0.15rem;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }
      .decision-proof-title {
        font-size: 0.95rem;
        font-weight: 800;
        color: var(--navy);
        line-height: 1.3;
      }
      .decision-proof-copy {
        margin-top: 0.35rem;
        font-size: 0.81rem;
        line-height: 1.58;
        color: var(--slate);
      }
      .hero-summary-label {
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.45rem;
      }
      .hero-summary-card p {
        font-size: 0.88rem;
        color: var(--slate);
        line-height: 1.6;
      }
      .trust-evidence-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .trust-evidence-card {
        display: grid;
        gap: 0.26rem;
        padding: 0.92rem 0.96rem;
        border-radius: 20px;
        border: 1px solid rgba(26, 122, 143, 0.12);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(246, 251, 252, 0.96) 100%
        );
        box-shadow: var(--shadow-card);
      }
      .trust-evidence-card.tone-fresh {
        background: linear-gradient(180deg, #f7fcf9 0%, #ffffff 100%);
        border-color: rgba(81, 153, 112, 0.18);
      }
      .trust-evidence-card.tone-source {
        background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
        border-color: rgba(90, 126, 191, 0.14);
      }
      .trust-evidence-card.tone-confirmed {
        background: linear-gradient(180deg, #fffdf8 0%, #ffffff 100%);
        border-color: rgba(194, 157, 76, 0.18);
      }
      .trust-evidence-card.tone-foundation {
        background: linear-gradient(180deg, #fbfbff 0%, #ffffff 100%);
        border-color: rgba(130, 139, 214, 0.14);
      }
      .trust-evidence-label {
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .trust-evidence-title {
        font-size: 0.92rem;
        font-weight: 800;
        line-height: 1.3;
        color: var(--navy);
      }
      .trust-evidence-copy {
        font-size: 0.8rem;
        line-height: 1.58;
        color: var(--slate);
      }
      .trust-evidence-proof {
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--teal-dark);
      }
      .trust-section-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
        margin-top: 0.95rem;
      }
      .trust-section-card {
        display: grid;
        gap: 0.26rem;
        padding: 0.92rem 0.96rem;
        border-radius: 18px;
        border: 1px solid rgba(26, 122, 143, 0.12);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(246, 251, 252, 0.96) 100%
        );
      }
      .trust-section-label {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .trust-section-title {
        font-size: 0.9rem;
        font-weight: 800;
        line-height: 1.32;
        color: var(--navy);
      }
      .trust-section-copy {
        font-size: 0.81rem;
        line-height: 1.58;
        color: var(--slate);
      }
      .decision-list-item {
        position: relative;
        padding-left: 1.05rem;
        font-size: 0.86rem;
        color: var(--slate);
        line-height: 1.62;
      }
      .decision-list-item + .decision-list-item {
        margin-top: 0.55rem;
      }
      .decision-list-item::before {
        content: "";
        position: absolute;
        top: 0.5rem;
        left: 0;
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: var(--teal);
      }
      .hero-next-step {
        font-size: 1rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 0.3rem;
      }
      .profile-actions {
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
        min-width: 0;
        padding: 1.08rem;
        border: 1px solid rgba(26, 122, 143, 0.12);
        border-radius: 24px;
        background: linear-gradient(
          180deg,
          rgba(250, 253, 254, 0.98) 0%,
          rgba(241, 248, 250, 0.96) 100%
        );
        position: sticky;
        top: 88px;
        box-shadow: var(--shadow-card);
      }
      .profile-actions-intro {
        display: grid;
        gap: 0.45rem;
        padding: 0.95rem 1rem;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(14, 77, 95, 0.98), rgba(31, 118, 137, 0.95));
        color: var(--white);
        box-shadow: 0 20px 38px rgba(16, 67, 83, 0.18);
      }
      .profile-actions-intro-label {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }
      .profile-actions-intro-title {
        font-size: 1.08rem;
        line-height: 1.3;
        font-weight: 800;
        color: var(--white);
      }
      .profile-actions-intro-copy {
        font-size: 0.83rem;
        line-height: 1.58;
        color: rgba(255, 255, 255, 0.84);
      }
      .profile-actions-header {
        display: grid;
        gap: 0.18rem;
      }
      .profile-actions-kicker {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .profile-actions-title {
        font-size: 0.98rem;
        font-weight: 800;
        color: var(--navy);
      }
      .profile-actions-microcopy {
        font-size: 0.8rem;
        line-height: 1.55;
