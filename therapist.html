<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Therapist Profile — BipolarTherapists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#1a7a8f;--teal-light:#2a9cb3;--teal-dark:#155f70;--teal-faint:#e8f5f8;--navy:#1d3a4a;--slate:#4a6572;--muted:#6b8290;--border:#d4e4e9;--bg:#f7fbfc;--white:#ffffff;--green:#3aaa7a}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--navy);line-height:1.6}
    nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
    .nav-icon{width:34px;height:34px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px}
    .nav-name{font-size:1rem;font-weight:700;color:var(--navy)}
    .nav-name span{color:var(--teal)}
    .nav-links{display:flex;gap:1.5rem;align-items:center;list-style:none}
    .nav-links a{text-decoration:none;color:var(--slate);font-size:.875rem;font-weight:500;transition:color .2s}
    .nav-links a:hover{color:var(--teal)}
    .nav-cta{background:var(--teal)!important;color:white!important;padding:.5rem 1.25rem;border-radius:8px;font-weight:600!important}
    .breadcrumb{padding:.75rem 1.5rem;background:var(--white);border-bottom:1px solid var(--border);font-size:.8rem;color:var(--muted)}
    .breadcrumb a{color:var(--teal);text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}
    .profile-wrap{max-width:900px;margin:2rem auto;padding:0 1.5rem}
    .profile-header{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.25rem;display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:start}
    .avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-light));display:flex;align-items:center;justify-content:center;color:white;font-size:2rem;font-weight:700;flex-shrink:0;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .profile-main h1{font-family:'Lora',serif;font-size:1.6rem;font-weight:600;color:var(--navy);line-height:1.2}
    .profile-main .creds{font-size:.9rem;font-weight:600;color:var(--teal);margin-top:.2rem}
    .profile-main .title-text{font-size:.875rem;color:var(--slate);margin-top:.1rem}
    .profile-main .location{font-size:.875rem;color:var(--muted);margin-top:.3rem;display:flex;align-items:center;gap:.4rem}
    .status-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:600;padding:.4rem .9rem;border-radius:100px}
    .badge-accepting{background:#e8f5ee;color:#1f7a52}
    .badge-waitlist{background:#f5f5f5;color:var(--muted)}
    .profile-actions{display:flex;flex-direction:column;gap:.6rem;min-width:160px}
    .btn-contact{display:block;text-align:center;background:var(--teal);color:white;padding:.75rem 1.25rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:.875rem;transition:background .2s}
    .btn-contact:hover{background:var(--teal-dark)}
    .btn-website{display:block;text-align:center;background:var(--teal-faint);color:var(--teal-dark);padding:.7rem 1.25rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:.875rem;transition:background .2s}
    .btn-website:hover{background:var(--border)}
    .profile-body{display:grid;grid-template-columns:1fr 320px;gap:1.25rem}
    .profile-section{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
    .profile-section h2{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
    .bio-text{font-size:.9rem;color:var(--slate);line-height:1.75;white-space:pre-line}
    .specialty-grid{display:flex;flex-wrap:wrap;gap:.5rem}
    .spec-tag{font-size:.8rem;font-weight:600;padding:.3rem .7rem;border-radius:100px;background:var(--teal-faint);color:var(--teal-dark)}
    .ins-list{display:flex;flex-direction:column;gap:.5rem}
    .ins-item{display:flex;align-items:center;gap:.5rem;font-size:.875rem;color:var(--slate)}
    .ins-item::before{content:'✓';color:var(--green);font-weight:700;font-size:.9rem}
    .sidebar-panel{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.35rem;margin-bottom:1.25rem}
    .sidebar-panel h3{font-size:.875rem;font-weight:700;color:var(--navy);margin-bottom:.85rem}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--bg);font-size:.85rem;gap:.75rem}
    .info-row:last-child{border-bottom:none}
    .info-label{color:var(--muted);font-weight:500}
    .info-val{color:var(--navy);font-weight:600;text-align:right}
    .info-val.green{color:var(--green)}
    .info-val.teal{color:var(--teal)}
    .contact-section{background:linear-gradient(135deg,var(--teal-faint),#ddf0f5);border:1px solid var(--border);border-radius:14px;padding:1.35rem}
    .contact-section h3{font-size:.875rem;font-weight:700;color:var(--navy);margin-bottom:1rem}
    .contact-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;font-size:.85rem;color:var(--slate);border-bottom:1px solid rgba(0,0,0,.06)}
    .contact-item:last-child{border-bottom:none}
    .contact-icon{font-size:1rem;width:24px;flex-shrink:0}
    .contact-item a{color:var(--teal);text-decoration:none;font-weight:500}
    .contact-item a:hover{text-decoration:underline}
    .fee-range{font-size:1.1rem;font-weight:700;color:var(--navy)}
    .fee-note{font-size:.75rem;color:var(--muted);margin-top:.15rem}
    .lang-pills{display:flex;flex-wrap:wrap;gap:.35rem}
    .lang-pill{font-size:.75rem;font-weight:500;padding:.2rem .55rem;border-radius:100px;background:var(--bg);border:1px solid var(--border);color:var(--slate)}
    .loading-profile{text-align:center;padding:5rem;color:var(--muted)}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .not-found{text-align:center;padding:5rem 1.5rem}
    .not-found h2{font-size:1.3rem;color:var(--navy);margin-bottom:.5rem}
    .not-found p{color:var(--muted);margin-bottom:1.5rem}
    .back-link{display:inline-block;color:var(--teal);font-size:.875rem;font-weight:600;text-decoration:none;padding:.6rem 1.25rem;border:1px solid var(--teal);border-radius:8px}
    footer{background:var(--navy);color:rgba(255,255,255,.7);padding:2rem 1.5rem;text-align:center;margin-top:2rem}
    footer p{font-size:.78rem}
    footer a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.78rem}
    @media(max-width:720px){.profile-header{grid-template-columns:auto 1fr;grid-template-rows:auto auto}.profile-actions{grid-column:1/-1;flex-direction:row}.profile-body{grid-template-columns:1fr}}
    @media(max-width:480px){.profile-header{grid-template-columns:1fr}.avatar{width:72px;height:72px;font-size:1.5rem}.profile-actions{flex-direction:column}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-icon">🧠</div>
      <span class="nav-name">Bipolar<span>Therapists</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="directory.html">Find a Therapist</a></li>
      <li><a href="signup.html" class="nav-cta">List Your Practice</a></li>
    </ul>
  </nav>

  <div class="breadcrumb">
    <a href="index.html">Home</a> › <a href="directory.html">Directory</a> › <span id="breadcrumbName">Loading...</span>
  </div>

  <div class="profile-wrap" id="profileWrap">
    <div class="loading-profile"><div class="spinner"></div>Loading profile...</div>
  </div>

  <footer>
    <p style="margin-bottom:.4rem"><strong style="color:white">🧠 BipolarTherapists</strong></p>
    <p>Is this your listing? <a href="mailto:hello@chatroam.polsia.app">Contact us</a> to update your profile.</p>
  </footer>

  <script type="module" src="assets/therapist-page.js"></script>
</body>
</html>
