<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Therapist Profile — BipolarTherapyHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --teal: #1a7a8f;
        --teal-light: #2a9cb3;
        --teal-dark: #155f70;
        --teal-faint: #e8f5f8;
        --navy: #1d3a4a;
        --slate: #4a6572;
        --muted: #6b8290;
        --border: #d4e4e9;
        --bg: #f7fbfc;
        --white: #ffffff;
        --green: #3aaa7a;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--navy);
        line-height: 1.6;
      }
      nav {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 0 1.5rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }
      .nav-icon {
        width: 34px;
        height: 34px;
        background: var(--teal);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
      }
      .nav-name {
        font-size: 1rem;
        font-weight: 700;
        color: var(--navy);
      }
      .nav-name span {
        color: var(--teal);
      }
      .nav-links {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        list-style: none;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--slate);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--teal);
      }
      .nav-shortlist {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }
      .nav-shortlist-count {
        min-width: 1.25rem;
        height: 1.25rem;
        border-radius: 999px;
        background: var(--teal-faint);
        color: var(--teal-dark);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0 0.35rem;
      }
      .nav-cta {
        background: var(--teal) !important;
        color: white !important;
        padding: 0.5rem 1.25rem;
        border-radius: 8px;
        font-weight: 600 !important;
      }
      .breadcrumb {
        padding: 0.75rem 1.5rem;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
        color: var(--muted);
      }
      .breadcrumb a {
        color: var(--teal);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .profile-wrap {
        max-width: 1120px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }
      .profile-header {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 1.5rem;
        margin-bottom: 1.25rem;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        gap: 1.35rem;
        align-items: start;
        box-shadow: 0 20px 40px rgba(14, 77, 95, 0.06);
      }
      .profile-hero-main {
        display: grid;
        gap: 1rem;
      }
      .profile-identity {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }
      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        background: linear-gradient(135deg, var(--teal), var(--teal-light));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .profile-main h1 {
        font-family: "Lora", serif;
        font-size: 2.1rem;
        font-weight: 600;
        color: var(--navy);
        line-height: 1.06;
      }
      .eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal);
        margin-bottom: 0.45rem;
      }
      .profile-main .creds {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--teal);
        margin-top: 0.3rem;
      }
      .profile-main .title-text {
        font-size: 0.92rem;
        color: var(--slate);
        margin-top: 0.12rem;
      }
      .profile-main .location {
        font-size: 0.9rem;
        color: var(--muted);
        margin-top: 0.45rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .practice-line {
        color: var(--navy);
        font-weight: 500;
      }
      .hero-meta {
        display: grid;
        gap: 0.7rem;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.4rem 0.9rem;
        border-radius: 100px;
      }
      .badge-accepting {
        background: #e8f5ee;
        color: #1f7a52;
      }
      .badge-waitlist {
        background: #f5f5f5;
        color: var(--muted);
      }
      .trust-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .trust-pill {
        font-size: 0.77rem;
        font-weight: 600;
        padding: 0.36rem 0.7rem;
        border-radius: 999px;
        background: var(--teal-faint);
        color: var(--teal-dark);
      }
      .fit-summary {
        font-size: 0.95rem;
        line-height: 1.7;
        color: var(--slate);
        max-width: 62ch;
      }
      .hero-summary-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr);
        gap: 0.85rem;
      }
      .hero-summary-card {
        border: 1px solid rgba(26, 122, 143, 0.12);
        border-radius: 18px;
        padding: 1rem 1.05rem;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbfc 100%);
      }
      .hero-summary-label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      .hero-summary-card p {
        font-size: 0.88rem;
        color: var(--slate);
        line-height: 1.6;
      }
      .hero-next-step {
        font-size: 1rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 0.3rem;
      }
      .profile-actions {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        min-width: 0;
        padding: 1rem;
        border: 1px solid rgba(26, 122, 143, 0.12);
        border-radius: 20px;
        background: linear-gradient(180deg, #fbfdfe 0%, #f3fafb 100%);
        position: sticky;
        top: 88px;
      }
      .profile-actions-header {
        display: grid;
        gap: 0.18rem;
      }
      .profile-actions-kicker {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .profile-actions-title {
        font-size: 0.98rem;
        font-weight: 800;
        color: var(--navy);
      }
      .btn-contact {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--teal);
        color: white;
        padding: 0.88rem 1rem;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        transition:
          background 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 12px 24px rgba(26, 122, 143, 0.18);
      }
      .btn-contact:hover {
        background: var(--teal-dark);
        transform: translateY(-1px);
      }
      .btn-contact-secondary {
        background: var(--teal-dark);
      }
      .btn-website {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.9);
        color: var(--teal-dark);
        padding: 0.72rem 0.95rem;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.84rem;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
        border: 1px solid rgba(26, 122, 143, 0.14);
      }
      .btn-website:hover {
        background: var(--white);
        border-color: rgba(26, 122, 143, 0.22);
      }
      .shortlist-profile-btn {
        border: 1px solid rgba(26, 122, 143, 0.14);
        cursor: pointer;
      }
      .shortlist-profile-btn.is-saved {
        background: rgba(26, 122, 143, 0.14);
        color: var(--teal-dark);
      }
      .profile-primary-action {
        display: grid;
        gap: 0.55rem;
      }
      .profile-primary-caption {
        font-size: 0.78rem;
        line-height: 1.5;
        color: var(--muted);
      }
      .profile-secondary-actions {
        display: grid;
        gap: 0.55rem;
      }
      .profile-secondary-label {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .profile-shortlist-status {
        margin-top: 0.1rem;
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.55;
      }
      .profile-shortlist-priority {
        margin-top: 0.85rem;
        max-width: 220px;
      }
      .profile-shortlist-priority label {
        display: block;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      .profile-shortlist-priority select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 0.84rem;
        color: var(--navy);
        background: var(--white);
        font-family: inherit;
      }
      .profile-body {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) 320px;
        gap: 1rem;
      }
      .profile-section {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.2rem 1.25rem;
        margin-bottom: 1rem;
        box-shadow: 0 14px 30px rgba(14, 77, 95, 0.04);
      }
      .profile-section h2 {
        font-size: 0.96rem;
        font-weight: 800;
        color: var(--navy);
        margin-bottom: 0.9rem;
      }
      .bio-text {
        font-size: 0.88rem;
        color: var(--slate);
        line-height: 1.7;
        white-space: pre-line;
      }
      .specialty-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .spec-tag {
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.3rem 0.7rem;
        border-radius: 100px;
        background: var(--teal-faint);
        color: var(--teal-dark);
      }
      .ins-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .ins-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--slate);
      }
      .ins-item::before {
        content: "✓";
        color: var(--green);
        font-weight: 700;
        font-size: 0.9rem;
      }
      .sidebar-panel {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.1rem 1.15rem;
        margin-bottom: 1rem;
        box-shadow: 0 14px 30px rgba(14, 77, 95, 0.04);
      }
      .trust-panel {
        background: linear-gradient(180deg, #f9fcfd 0%, #eef7f9 100%);
      }
      .sidebar-panel h3 {
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--navy);
        margin-bottom: 0.8rem;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.45rem 0;
        border-bottom: 1px solid var(--bg);
        font-size: 0.85rem;
        gap: 0.75rem;
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .info-label {
        color: var(--muted);
        font-weight: 500;
      }
      .info-val {
        color: var(--navy);
        font-weight: 600;
        text-align: right;
      }
      .info-val.green {
        color: var(--green);
      }
      .info-val.teal {
        color: var(--teal);
      }
      .match-confidence-note {
        margin: 0.2rem 0 0.65rem;
        padding: 0.75rem 0.85rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(26, 122, 143, 0.12);
        color: var(--slate);
        font-size: 0.82rem;
        line-height: 1.6;
      }
      .contact-section {
        background: linear-gradient(135deg, var(--teal-faint), #ddf0f5);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.35rem;
      }
      .action-panel-note {
        font-size: 0.8rem;
        line-height: 1.55;
        color: var(--muted);
        padding-top: 0.75rem;
        border-top: 1px solid rgba(26, 122, 143, 0.1);
      }
      .profile-cta-stack {
        display: grid;
        gap: 0.55rem;
      }
      .profile-sidebar-stack {
        display: grid;
        gap: 1rem;
      }
      .contact-section h3 {
        font-size: 0.875rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 1rem;
      }
      .contact-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.5rem 0;
        font-size: 0.85rem;
        color: var(--slate);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }
      .contact-item:last-child {
        border-bottom: none;
      }
      .contact-icon {
        font-size: 1rem;
        width: 24px;
        flex-shrink: 0;
      }
      .contact-item a {
        color: var(--teal);
        text-decoration: none;
        font-weight: 500;
      }
      .contact-item a:hover {
        text-decoration: underline;
      }
      .fee-range {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--navy);
      }
      .fee-note {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }
      .lang-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .lang-pill {
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.2rem 0.55rem;
        border-radius: 100px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--slate);
      }
      .loading-profile {
        text-align: center;
        padding: 5rem;
        color: var(--muted);
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--border);
        border-top-color: var(--teal);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .not-found {
        text-align: center;
        padding: 5rem 1.5rem;
      }
      .not-found h2 {
        font-size: 1.3rem;
        color: var(--navy);
        margin-bottom: 0.5rem;
      }
      .not-found p {
        color: var(--muted);
        margin-bottom: 1.5rem;
      }
      .back-link {
        display: inline-block;
        color: var(--teal);
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        padding: 0.6rem 1.25rem;
        border: 1px solid var(--teal);
        border-radius: 8px;
      }
      footer {
        background: var(--navy);
        color: rgba(255, 255, 255, 0.7);
        padding: 2rem 1.5rem;
        text-align: center;
        margin-top: 2rem;
      }
      footer p {
        font-size: 0.78rem;
      }
      footer a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.78rem;
      }
      @media (max-width: 720px) {
        .profile-header {
          grid-template-columns: 1fr;
        }
        .profile-actions {
          position: static;
        }
        .profile-body {
          grid-template-columns: 1fr;
        }
        .hero-summary-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 480px) {
        .profile-identity {
          grid-template-columns: 1fr;
        }
        .avatar {
          width: 72px;
          height: 72px;
          font-size: 1.5rem;
          border-radius: 20px;
        }
        .profile-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="nav-logo">
        <span class="nav-name">Bipolar<span>TherapyHub</span></span>
      </a>
      <ul class="nav-links">
        <li>
          <a href="directory.html" class="nav-shortlist" data-shortlist-link
            >Shortlist <span class="nav-shortlist-count" data-shortlist-count>0</span></a
          >
        </li>
        <li><a href="directory.html">Find a Therapist</a></li>
        <li><a href="signup.html" class="nav-cta" id="navClaimLink">List Your Practice</a></li>
      </ul>
    </nav>

    <div class="breadcrumb">
      <a href="index.html">Home</a> › <a href="directory.html">Directory</a> ›
      <span id="breadcrumbName">Loading...</span>
    </div>

    <div class="profile-wrap" id="profileWrap">
      <div class="loading-profile">
        <div class="spinner"></div>
        Loading profile...
      </div>
    </div>

    <footer>
      <p style="margin-bottom: 0.4rem">
        <strong style="color: white">BipolarTherapyHub</strong>
      </p>
      <p>
        Is this your listing?
        <a href="signup.html" id="footerClaimLink">Claim or update your listing</a>.
      </p>
    </footer>

    <script type="module" src="assets/therapist-page.js"></script>
    <script type="module" src="assets/shortlist-nav.js"></script>
  </body>
</html>
