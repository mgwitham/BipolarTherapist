name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CMS dependencies
        run: npm --prefix studio ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build website
        run: npm run build

      - name: Check bundle budgets
        run: npm run check:bundle-budgets

      - name: Check internal links
        run: npm run check:internal-links

      - name: Build CMS
        run: npm run cms:build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      # The e2e harness never reads a .env: the API server injects an
      # in-memory Sanity client and hand-built config. These dummies only
      # exist so any VITE_* reads in the dev server resolve cleanly in an
      # env-less CI checkout.
      VITE_SANITY_PROJECT_ID: e2e-memory
      VITE_SANITY_DATASET: e2e
      VITE_SANITY_API_VERSION: 2026-04-02
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Fails the build on a known high/critical advisory in shipped
      # production dependencies. Reads the lockfile against npm's advisory
      # DB — no install needed. Dev-only deps are excluded to avoid blocking
      # on build-tool advisories that never reach production.
      - name: Audit production dependencies (root)
        run: npm audit --omit=dev --audit-level=high

      # Studio (Sanity CMS) is build-time only; still gate on high/critical.
      - name: Audit studio dependencies
        run: npm --prefix studio audit --audit-level=high

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}

      # Pick one representative, known-to-exist URL per SEO template from the
      # freshly-built dist/ so the audit can never silently run against a 404
      # if a therapist is delisted/renamed. Thresholds stay in
      # .lighthouserc.json; this only rewrites the URL list.
      - name: Pick Lighthouse targets from dist
        run: node scripts/generate-lighthouse-config.mjs

      # Audit the PR's own freshly-built dist/ (lhci serves it locally) so
      # regressions are caught before merge — not one deploy late against
      # prod. Assertions live in .lighthouserc.json; URLs are generated above.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.generated.json
          uploadArtifacts: true
          temporaryPublicStorage: true
