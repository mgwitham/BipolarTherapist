# Manually-triggered photo sourcing sweep. Calls the production
# /api/review/cron/source-photos endpoint in a loop — each call processes
# up to 10 unclaimed listings' own websites into the review vault — until
# nothing eligible remains or max_calls is hit. Sourced photos publish
# only after admin approval in the Portal → "Sourced photo review" panel.
#
# Auth is keyless: the job requests a GitHub OIDC token (id-token: write)
# and the API verifies it against GitHub's public keys, pinned to this
# repository and refs/heads/main (see server/github-oidc.mjs). No secret
# needs to be configured. If a CRON_SECRET Actions secret exists it is
# used instead — handy if OIDC ever misbehaves.
name: Source photos

on:
  workflow_dispatch:
    inputs:
      max_calls:
        description: "Max endpoint calls (each processes up to 10 sites)"
        required: false
        default: "60"
      dry_run:
        description: "Dry run — report picks, write nothing"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Sweep directory for sourceable headshots
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MAX_CALLS: ${{ inputs.max_calls }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          mint_token() {
            if [ -n "$CRON_SECRET" ]; then
              AUTH_TOKEN="$CRON_SECRET"
              return
            fi
            # Keyless: GitHub OIDC tokens expire after ~5 minutes, so mint a
            # fresh one before every call rather than once per job — a full
            # sweep runs longer than a token lives.
            AUTH_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=bipolartherapyhub-cron" | jq -r '.value')
            if [ -z "$AUTH_TOKEN" ] || [ "$AUTH_TOKEN" = "null" ]; then
              echo "::error::Could not obtain a GitHub OIDC token (is 'permissions: id-token: write' present?)"
              exit 1
            fi
          }
          BASE="https://www.bipolartherapyhub.com/api/review/cron/source-photos"
          DRY=""
          if [ "$DRY_RUN" = "true" ]; then DRY="&dry=1"; fi

          total_queued=0
          total_processed=0
          remaining="unknown"
          dry_streak=0
          for i in $(seq 1 "$MAX_CALLS"); do
            mint_token
            http_out=$(curl -sS -w "\n%{http_code}" -H "Authorization: Bearer $AUTH_TOKEN" "$BASE?limit=10$DRY")
            code=$(printf '%s' "$http_out" | tail -n 1)
            body=$(printf '%s' "$http_out" | sed '$d')
            echo "── call $i (HTTP $code)"
            printf '%s' "$body" | jq . || printf '%s\n' "$body"
            if [ "$code" != "200" ]; then
              echo "::error::endpoint returned HTTP $code on call $i"
              exit 1
            fi
            queued=$(printf '%s' "$body" | jq -r '.queued // 0')
            processed=$(printf '%s' "$body" | jq -r '.processed // 0')
            remaining=$(printf '%s' "$body" | jq -r '.remainingEligible // 0')
            total_queued=$((total_queued + queued))
            total_processed=$((total_processed + processed))
            if [ "$remaining" = "0" ] || [ "$processed" = "0" ]; then
              break
            fi
            # Listings with no findable headshot stay eligible by design (they
            # rotate to the back for future re-tries), so "remaining" never
            # reaches 0 on its own. Once several consecutive calls queue
            # nothing, the sweep has lapped the directory — stop.
            if [ "$queued" = "0" ]; then
              dry_streak=$((dry_streak + 1))
              if [ "$dry_streak" -ge 3 ]; then
                echo "No new photos queued in $dry_streak consecutive calls — directory swept."
                break
              fi
            else
              dry_streak=0
            fi
            sleep 3
          done

          {
            echo "### Photo sourcing sweep"
            echo ""
            echo "- Mode: $([ "$DRY_RUN" = "true" ] && echo 'dry run' || echo 'live')"
            echo "- Sites processed: $total_processed"
            echo "- Headshots queued for review: $total_queued"
            echo "- Still eligible after run: $remaining"
            echo ""
            echo "Review queued photos in the admin → Portal → Sourced photo review."
          } >> "$GITHUB_STEP_SUMMARY"
