name: Bug report
description: Report something that is broken or behaving incorrectly
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you expected and what actually happened.
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Notice ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS, or any setup details that matter.
      placeholder: Safari on macOS, Chrome on iPhone, etc.

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Screenshots, logs, or anything else that would help.
